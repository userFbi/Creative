<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background-color: #f8f9fc;
      }
      .sidebar {
        width: 220px;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        background-color: #0d1321;
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1.5rem 1rem;
      }
      .nav-section {
        display: flex;
        flex-direction: column;
      }
      .sidebar h5 {
        padding-left: 10px;
        font-weight: 500;
        font-size: 1.5rem; /* similar to h2 size */
        margin-bottom: 1rem;
        padding-top: 30px;
        padding-bottom: 35px;
        color: #fff;
        border-bottom: 2px solid #1c2232; /* border separator */
      }

      .sidebar a {
        display: block;
        color: #ccc;
        padding: 0.6rem 1rem;
        text-decoration: none;
        margin-bottom: 0.4rem;
        border-radius: 6px;
      }
      .sidebar a:hover,
      .sidebar a.active {
        color: #fff;
        background-color: #1c2232;
      }
      .logout-btn {
        text-align: center;
      }
      .main-content {
        margin-left: 220px;
        padding: 2rem;
      }
      .card-box {
        border-radius: 12px;
        background: #fff;
        padding: 1.5rem;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
        height: 100%;
      }
      .btn-primary {
        background-color: #3b82f6;
        border: none;
        border-radius: 8px;
        padding: 0.6rem 1.2rem;
      }
      .recent-item {
        background-color: #f3f4f6;
        padding: 0.8rem 1rem;
        border-radius: 8px;
        margin-bottom: 0.5rem;
      }
      .recent-item small {
        color: #6b7280;
      }
      canvas {
        max-height: 300px;
      }
      .text-purple {
        color: #7c3bed;
      }
      .card-box {
        border-radius: 12px;
        background: #fff;
        padding: 1.5rem;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
        height: 100%;
        transition: box-shadow 0.3s ease; /* smooth shadow transition */
      }

      .card-box:hover {
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15); /* deeper shadow */
      }

      .card-box h5 i {
        color: #0a60eb;
      }

      .contact-icon i {
        color: #2bab2b !important;
      }
      .recent-contact {
        display: flex;
        justify-content: space-between;
        align-items: center; /* ensures name & icon are vertically centered */
        background: #f9fafb;
        padding: 0.8rem 1rem;
        border-radius: 8px;
        margin-bottom: 0.6rem;
        transition: background 0.2s ease;
      }

      .recent-contact:hover {
        background: #f1f5f9;
      }

      .contact-name {
        font-size: 0.95rem;
        font-weight: 500; /* medium, not too bold */
        color: #111827;
      }

      .view-btn {
        background: none;
        border: none;
        color: #6b7280;
        cursor: pointer;
        font-size: 1.2rem;
        transition: color 0.2s ease;
        display: flex;
        align-items: center; /* centers the eye icon vertically */
      }

      .view-btn:hover {
        color: #111827;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="nav-section">
        <h5>Admin Panel</h5>
        <a href="admin-new.html">
          <i class="bi bi-speedometer2 me-2"></i> Dashboard</a
        >
        <a href="add-transaction.html">
          <i class="bi bi-plus-circle me-2"></i>Add Transaction</a
        >
        <a href="reports.html" class="active">
          <i class="bi bi-bar-chart-line me-2"></i>Reports</a
        >
      </div>
      <div class="logout-btn">
        <a href="#" onclick="logout()" class="text-danger">Logout</a>
      </div>
    </div>

    <div class="main-content">
      <h3>Transactions Report</h3>
      <div id="reportsDiv"></div>
    </div>

    <script>
      const reportsDiv = document.getElementById('reportsDiv')

      // get saved transactions
      let transactions = JSON.parse(
        localStorage.getItem('transactions') || '[]'
      )
      transactions.forEach((t, index) => {
        const div = document.createElement('div')
        div.className = 'recent-contact'
        div.innerHTML = `
    <div>
      <strong>${t.type.toUpperCase()}:</strong> ₹${t.amount} <br>
      Date: ${t.date} | Source: ${t.source} <br>
      ${t.description ? 'Desc: ' + t.description : ''}
    </div>
    <button class="view-btn" onclick="erase(${index})"><i class="bi bi-eye"></i></button>
  `
        reportsDiv.appendChild(div)
      })

      // delete a transaction
      function erase(index) {
        transactions.splice(index, 1)
        localStorage.setItem('transactions', JSON.stringify(transactions))
        location.reload()
      }
    </script>
  </body>
</html>
