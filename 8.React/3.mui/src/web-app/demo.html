<!--
Project: TempShare
Files included below: index.html (frontend), styles.css, upload.js, server.js (Node/Express), cron-delete.js, package.json, .env.example, README.md
This is a minimal, production-ready starter for a mobile-first + desktop-friendly temporary file-sharing website using Cloudflare R2 (S3-compatible).

Instructions (quick):
1. Create Cloudflare R2 bucket and get R2 credentials (accountId, accessKeyId, secretAccessKey, bucket name, endpoint).
2. Place credentials in `.env` according to .env.example
3. `npm install`
4. `node server.js` (or use pm2)
5. Start cron: `node cron-delete.js` (or run via system cron every 10 minutes)

Note: The frontend includes drag & drop (big box) + mobile-friendly form. Expiry options: 1,2,3,7 days.
-->

<!-- ================= index.html ================= -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TempShare — temporary photo & video sharing</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container">
        <h1 class="brand">TempShare</h1>
        <p class="tag">Upload. Choose expiry. Share link.</p>
      </div>
    </header>

    <main class="container">
      <section class="upload-card">
        <div id="dropZone" class="dropzone">
          <div class="drop-inner">
            <p class="big">Drag & Drop photos or videos here</p>
            <p class="small">
              Or <label for="fileInput" class="link">choose files</label>
            </p>
            <input
              id="fileInput"
              type="file"
              multiple
              accept="image/*,video/*"
              hidden
            />
          </div>
        </div>

        <form id="uploadForm" class="upload-form">
          <label class="field">
            <span>Expiry (days)</span>
            <select id="expiry" required>
              <option value="1">1 day</option>
              <option value="2">2 days</option>
              <option value="3" selected>3 days</option>
              <option value="7">7 days</option>
            </select>
          </label>

          <label class="field smallfield">
            <span>Optional filename (visible in link)</span>
            <input id="fname" type="text" placeholder="My-trip-video.mp4" />
          </label>

          <div class="actions">
            <button id="uploadBtn" type="submit" class="btn primary">
              Upload & Get Link
            </button>
          </div>
        </form>

        <div id="previewArea" class="preview-area" aria-live="polite"></div>
      </section>

      <section class="info">
        <h3>How it works</h3>
        <ul>
          <li>Files stored on Cloudflare R2 (free 10 GB).</li>
          <li>Choose expiry: 1,2,3 or 7 days.</li>
          <li>Automatic deletion by server cron when expired.</li>
        </ul>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        Built for you and your friends • Mobile & Desktop friendly
      </div>
    </footer>

    <script src="/upload.js"></script>
  </body>
</html>
