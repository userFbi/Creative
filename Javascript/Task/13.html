<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Header</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      .header {
        width: auto;
        border-bottom: 1px solid black;
      }
      .flex {
        display: flex;
        justify-content: space-evenly;

        align-items: center;
      }
      .links ul {
        display: flex;
        gap: 30px;
      }
      .links ul li {
        list-style: none;
      }

      .links a {
        display: none;
        font-size: 30px;
      }

      @media (max-width: 900px) {
        .header {
          height: auto;
        }
        .links ul {
          display: none;
        }
        .links a {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="flex">
        <div class="logo">Creative</div>
        <div class="links">
          <a id="menu" onclick="openMenu()">
            <i class="bi bi-list"></i>
          </a>
          <ul>
            <li>Home</li>
            <li>Courses</li>
            <li>Activites</li>
            <li>Blog</li>
            <li>Know us</li>
            <li>Get in touch</li>
            <li>Student zone</li>
          </ul>
        </div>
      </div>
      <!-- <div class="temp">
        <ul>
          <li>Home</li>
          <li>Courses</li>
          <li>Activites</li>
          <li>Blog</li>
          <li>Know us</li>
          <li>Get in touch</li>
          <li>Student zone</li>
        </ul>
      </div> -->
    </div>
  </body>
  <script>
    let i = 2

    function openMenu() {
      if (i % 2 == 0) {
        document.getElementById('menu').innerHTML = '<i class="bi bi-x"></i>'
        document.getElementById('temp')
      } else {
        document.getElementById('menu').innerHTML =
          ' <i class="bi bi-list"></i>'
      }
      i++
    }
  </script>
</html>
