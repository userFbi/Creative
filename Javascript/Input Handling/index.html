<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="text" id="firstName" placeholder="First Name" />
    <input type="text" id="lastName" placeholder="last Name" />
    <button onclick="change()">Submit</button>

    <ul id="setData"></ul>

    <script>
      let editLi = null
      function change() {
     

        var firstName = document.getElementById('firstName').value
        var lastName = document.getElementById('lastName').value

        var ul = document.getElementById('setData')

        if (editLi) {
          editLi.firstChild.textContent = firstName + ' '
          editLi = null
        } else {
          var li = document.createElement('li')

          li.innerHTML +=
            firstName +
            '-' +
            lastName +
            ' ' +
            '<button onclick= erase(this)>Delete </button>' +
            '<button onClick=edit(this)>Edit</button><br>'

          ul.appendChild(li)
        }

        document.getElementById('firstName').value = ''
        document.getElementById('lastName').value = ''
      }
      function erase(btn) {
        btn.parentElement.remove()
      }

      function edit(el) {
        editLi = el.parentElement
        document.getElementById('firstName').value =
          editLi.firstChild.textContent
      }
    </script>
  </body>
</html>
