<!-- [] name , surname

object => {key : "value"} -->
<script>
    let setData = []

    function createData()
    {
        const name = document.getElementById('name').value
        const surname = document.getElementById('surname').value

        const obj = {name , surname}
        console.log(obj)

        setData.push(obj)

        document.getElementById('name').value=''
        document.getElementById('surname').value=''
        dataView()
    }

    function dataView()
    {
        //console.log(setData)
        let myData = ''
        setData.map((item , index) => {
            myData += `<tr><td>${item.name}</td><td>${item.surname}</td></tr>`
        })
        document.getElementById('showData').innerHTML=myData
    }
</script>


<input type="text" name="" id="name"> <br><br>
<input type="text" name="" id="surname"> <br><br>
<button onclick="createData()">Submit</button>

<table border="1">
    <tr>
        <td>Name</td>
        <td>Surname</td>
    </tr>
    <tbody id="showData"></tbody>
</table>
